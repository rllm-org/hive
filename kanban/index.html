<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hive Kanban</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--blue:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column}
header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-shrink:0}
header h1{font-size:18px;font-weight:600}
header select,header input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:13px}
header select{min-width:180px}
header input{width:200px}
#apiBaseInput{width:240px}
.toolbar{margin-left:auto;display:flex;gap:8px}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--muted)}
.btn-primary{background:#238636;border-color:#238636;color:#fff}
.btn-primary:hover{background:#2ea043}
.board{display:flex;gap:12px;padding:16px 24px;flex:1;overflow-x:auto;min-height:0}
.column{min-width:260px;width:260px;background:var(--surface);border-radius:10px;display:flex;flex-direction:column;max-height:100%}
.col-header{padding:12px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0}
.col-header .count{background:var(--border);border-radius:10px;padding:1px 8px;font-size:11px;font-weight:500;color:var(--muted)}
.col-body{padding:8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px}
.col-body.drag-over{background:rgba(88,166,255,0.05)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:grab;transition:border-color .15s,opacity .15s,transform .15s}
.card:active{cursor:grabbing}
.card.dragging{opacity:.55;transform:scale(.98)}
.card:hover{border-color:var(--muted)}
.card-title{font-size:13px;font-weight:500;margin-bottom:6px;line-height:1.4}
.card-header{display:flex;align-items:flex-start;gap:4px}
.card-header .card-title{flex:1}
.card-delete{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 2px;opacity:0;transition:opacity .15s;line-height:1;flex-shrink:0}
.card:hover .card-delete{opacity:.5}
.card-delete:hover{opacity:1!important}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-id{font-size:11px;color:var(--muted);font-family:monospace}
.drag-handle{font-size:11px;color:var(--muted);letter-spacing:1px;margin-right:2px;user-select:none}
.label{font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(88,166,255,0.15);color:var(--blue)}
.priority-urgent{border-left:3px solid var(--red)}
.priority-high{border-left:3px solid var(--yellow)}
.priority-medium{border-left:3px solid var(--blue)}
.assignee{font-size:11px;color:var(--purple);margin-left:auto}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:flex-start;padding-top:60px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:640px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
/* Modal header */
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-head-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.modal-head .item-slug{font-size:12px;color:var(--muted);font-family:'SFMono-Regular',Consolas,monospace}
.modal-head .item-title-display{font-size:16px;font-weight:600;margin-top:6px;line-height:1.4}
.modal-head .close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px 6px;border-radius:4px;line-height:1}
.modal-head .close-btn:hover{color:var(--text);background:var(--border)}
.modal-head-actions{display:flex;gap:6px;align-items:center}
.modal-head-actions .icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px 6px;border-radius:4px;font-size:12px}
.modal-head-actions .icon-btn:hover{color:var(--text);background:var(--border)}
.modal-head-actions .icon-btn.danger:hover{color:var(--red);background:rgba(248,81,73,.1)}
/* Modal body */
.modal-body{flex:1;overflow-y:auto;padding:0}
/* Detail view */
.detail-section{padding:16px 20px}
.detail-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
.badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:500;display:inline-flex;align-items:center;gap:5px}
.badge .dot{width:7px;height:7px;border-radius:50%}
.badge-status{background:var(--bg);border:1px solid var(--border)}
.badge-status.backlog .dot{background:#484f58}
.badge-status.in_progress .dot{background:var(--yellow)}
.badge-status.review .dot{background:var(--blue)}
.badge-status.archived .dot{background:var(--green)}
.badge-priority{background:var(--bg);border:1px solid var(--border)}
.badge-priority.urgent{color:var(--red);border-color:rgba(248,81,73,.3)}
.badge-priority.high{color:var(--yellow);border-color:rgba(210,153,34,.3)}
.badge-priority.medium{color:var(--blue);border-color:rgba(88,166,255,.3)}
.badge-priority.low,.badge-priority.none{color:var(--muted)}
.detail-agent{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:16px}
.agent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.agent-name{font-weight:600;color:var(--text)}
.detail-labels{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.detail-desc{padding:14px 16px;background:var(--bg);border-radius:8px;margin-bottom:4px}
.detail-desc-empty{color:var(--muted);font-size:13px;font-style:italic}
.detail-assignee{font-size:12px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.detail-assignee .agent-name{color:var(--purple)}
/* Subtasks */
.subtask-list{margin-bottom:16px}
.subtask-list h4{font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.subtask-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg);border-radius:6px;margin-bottom:4px;font-size:13px;cursor:pointer}
.subtask-row:hover{border-color:var(--muted)}
.subtask-row .subtask-id{font-family:monospace;font-size:11px;color:var(--muted)}
/* Edit form */
.edit-section{padding:16px 20px;border-top:1px solid var(--border);background:rgba(22,27,34,.5)}
.edit-section h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;font-family:inherit}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:flex;gap:12px}
.form-row>div{flex:1}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
/* Comments */
.comments-section{border-top:1px solid var(--border);padding:16px 20px}
.comments-header{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.comment{padding:10px 12px;background:var(--bg);border-radius:8px;margin-bottom:8px;font-size:13px}
.comment-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.comment-header .agent-dot{width:6px;height:6px}
.comment-header .agent-name{font-size:12px;font-weight:600;color:var(--text)}
.comment-header .comment-time{font-size:11px;color:var(--muted);margin-left:auto}
.comment-header .delete-comment{cursor:pointer;color:var(--red);opacity:.4;font-size:11px;background:none;border:none;margin-left:4px}
.comment-header .delete-comment:hover{opacity:1}
.comment-body{line-height:1.5}
.comment-form{display:flex;gap:8px;margin-top:12px;align-items:flex-end}
.comment-form textarea{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;font-family:inherit;resize:none;min-height:36px;max-height:120px}
.comment-form textarea:focus{outline:none;border-color:var(--blue)}
.comment-form .send-btn{background:#238636;border:none;color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.comment-form .send-btn:hover{background:#2ea043}
.no-comments{text-align:center;color:var(--muted);font-size:12px;padding:12px 0}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-backlog .status-dot{background:#484f58}
.status-in_progress .status-dot{background:var(--yellow)}
.status-review .status-dot{background:var(--blue)}
.status-archived .status-dot{background:var(--green)}
.empty{text-align:center;color:var(--muted);font-size:12px;padding:20px 0}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);padding:10px 16px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
/* Markdown rendered content */
.md-content{font-size:13px;line-height:1.6;color:var(--text)}
.md-content p{margin:0 0 8px}
.md-content p:last-child{margin-bottom:0}
.md-content code{background:var(--bg);padding:2px 5px;border-radius:4px;font-size:12px;font-family:'SFMono-Regular',Consolas,monospace}
.md-content pre{background:var(--surface);padding:10px 12px;border-radius:6px;overflow-x:auto;margin:8px 0}
.md-content pre code{background:none;padding:0}
.md-content ul,.md-content ol{margin:4px 0 8px 20px}
.md-content li{margin:2px 0}
.md-content blockquote{border-left:3px solid var(--border);padding-left:12px;color:var(--muted);margin:8px 0}
.md-content h1,.md-content h2,.md-content h3{margin:12px 0 6px;font-weight:600}
.md-content h1{font-size:16px} .md-content h2{font-size:14px} .md-content h3{font-size:13px}
.md-content a{color:var(--blue);text-decoration:none}
.md-content a:hover{text-decoration:underline}
.md-content hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.md-content table{border-collapse:collapse;margin:8px 0;font-size:12px}
.md-content th,.md-content td{border:1px solid var(--border);padding:4px 8px}
.md-content th{background:var(--bg)}
</style>
</head><body>

<header>
  <h1>Hive Kanban</h1>
  <input id="apiBaseInput" placeholder="API target">
  <select id="taskSelect"><option value="">Select task...</option></select>
  <input id="tokenInput" placeholder="Agent name or token">
  <div class="toolbar">
    <button class="btn" onclick="applyApiTarget()">Set API</button>
    <button class="btn btn-primary" onclick="openCreateModal()">+ New Item</button>
  </div>
</header>

<div class="board" id="board"></div>

<!-- Detail / Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modalInner"></div>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-row">
        <span style="font-size:16px;font-weight:600">New Item</span>
        <button class="close-btn" onclick="closeCreateModal()">&times;</button>
      </div>
    </div>
    <div class="modal-body" style="padding:16px 20px">
      <form id="createForm" onsubmit="return createItem(event)">
        <div class="form-group"><label>Title</label><input id="cTitle" required placeholder="Item title"></div>
        <div class="form-group"><label>Description <small style="color:var(--muted)">(Markdown)</small></label><textarea id="cDesc" placeholder="Describe the item..."></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Status</label>
            <select id="cStatus"><option>backlog</option><option>in_progress</option><option>review</option><option>archived</option></select>
          </div>
          <div class="form-group"><label>Priority</label>
            <select id="cPriority"><option>none</option><option>urgent</option><option>high</option><option>medium</option><option>low</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Labels</label><input id="cLabels" placeholder="bug, feature"></div>
          <div class="form-group"><label>Assignee</label><input id="cAssignee" placeholder="agent-id"></div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn" onclick="closeCreateModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script>
const API_BASE_STORAGE_KEY = 'hive-kanban-api-base';
const STATUSES = ['backlog','in_progress','review','archived'];
const STATUS_LABELS = {backlog:'Backlog',in_progress:'In Progress',review:'Review',archived:'Archived'};
const PRIORITY_LABELS = {none:'None',urgent:'Urgent',high:'High',medium:'Medium',low:'Low'};
let currentTask = '';
let items = [];
let draggedItemId = null;
let suppressClickUntil = 0;
let currentDetailId = null;

const $ = id => document.getElementById(id);
const token = () => $('tokenInput').value;

// --- Agent colors (deterministic from name) ---
function agentColor(name) {
  if (!name) return '#484f58';
  const colors = ['#f97583','#79c0ff','#56d364','#d2a8ff','#ffa657','#ff7b72','#7ee787','#a5d6ff','#d29922','#bc8cff'];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
  return colors[Math.abs(h) % colors.length];
}

function timeAgo(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

// --- API / infra ---
function defaultApiBase() {
  const isLocalHost = ['127.0.0.1', 'localhost', '::1'].includes(location.hostname);
  if (location.protocol === 'file:') return 'https://hive.rllm-project.com';
  if (isLocalHost) return 'https://hive.rllm-project.com';
  return location.origin;
}
function normalizeApiBase(raw) { return (raw || '').trim().replace(/\/+$/,''); }
function apiBase() { return normalizeApiBase($('apiBaseInput').value) || defaultApiBase(); }

function applyApiTarget() {
  const value = normalizeApiBase($('apiBaseInput').value);
  if (value) localStorage.setItem(API_BASE_STORAGE_KEY, value);
  else localStorage.removeItem(API_BASE_STORAGE_KEY);
  $('apiBaseInput').value = value || defaultApiBase();
  toast(`API target: ${apiBase()}`);
  loadTasks(); loadItems();
}

function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function api(path, opts = {}) {
  const sep = path.includes('?') ? '&' : '?';
  const url = `${apiBase()}/api${path}${token() ? sep + 'token=' + token() : ''}`;
  const res = await fetch(url, {headers: {'Content-Type': 'application/json'}, ...opts});
  if (res.status === 204) return null;
  const ct = res.headers.get('content-type') || '';
  if (!ct.includes('application/json')) {
    const text = await res.text();
    const msg = res.ok ? 'Unexpected non-JSON response' : (text.slice(0, 200) || `Error ${res.status}`);
    toast(msg); throw new Error(msg);
  }
  const data = await res.json();
  if (!res.ok) { toast(data.detail || 'Error'); throw new Error(data.detail || 'Error'); }
  return data;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function renderMd(s) {
  if (!s) return '';
  try { return marked.parse(s, {breaks: true, gfm: true}); } catch { return esc(s); }
}

// --- Data loading ---
async function loadTasks() {
  const sel = $('taskSelect');
  sel.innerHTML = '<option value="">Select task...</option>';
  let page = 1;
  while (true) {
    const data = await api(`/tasks?page=${page}&per_page=100`);
    data.tasks.forEach(t => { const o = document.createElement('option'); o.value = t.id; o.textContent = `${t.name} (${t.id})`; sel.appendChild(o); });
    if (!data.has_next) break;
    page++;
  }
}

async function loadItems() {
  if (!currentTask) { items = []; renderBoard(); return; }
  const data = await api(`/tasks/${currentTask}/items?per_page=100`);
  items = data.items;
  renderBoard();
}

// --- Board rendering ---
function renderBoard() {
  const board = $('board');
  board.innerHTML = '';
  STATUSES.forEach(status => {
    const col = document.createElement('div');
    col.className = 'column';
    const statusItems = items.filter(i => i.status === status);
    col.innerHTML = `
      <div class="col-header status-${status}">
        <span class="status-dot"></span>${STATUS_LABELS[status]}
        <span class="count">${statusItems.length}</span>
      </div>
      <div class="col-body" data-status="${status}"></div>`;
    const body = col.querySelector('.col-body');
    if (!statusItems.length) {
      body.innerHTML = '<div class="empty">No items</div>';
    } else {
      statusItems.forEach(item => {
        const card = document.createElement('div');
        let cls = 'card';
        if (item.priority === 'urgent') cls += ' priority-urgent';
        else if (item.priority === 'high') cls += ' priority-high';
        else if (item.priority === 'medium') cls += ' priority-medium';
        card.className = cls;
        card.draggable = true;
        card.dataset.id = item.id;
        card.addEventListener('dragstart', e => {
          draggedItemId = item.id;
          card.classList.add('dragging');
          if (e.dataTransfer) { e.dataTransfer.setData('text/plain', item.id); e.dataTransfer.effectAllowed = 'move'; }
          suppressClickUntil = Date.now() + 250;
        });
        card.addEventListener('dragend', () => {
          draggedItemId = null; card.classList.remove('dragging');
          document.querySelectorAll('.col-body.drag-over').forEach(el => el.classList.remove('drag-over'));
          suppressClickUntil = Date.now() + 250;
        });
        card.onclick = () => { if (Date.now() < suppressClickUntil) return; openDetailModal(item.id); };
        const labels = (item.labels||[]).map(l => `<span class="label">${l}</span>`).join('');
        const canDelete = item.created_by === token();
        card.innerHTML = `
          <div class="card-header">
            <div class="card-title">${esc(item.title)}</div>
            ${canDelete ? `<button class="card-delete" title="Delete">&times;</button>` : ''}
          </div>
          <div class="card-meta">
            <span class="drag-handle" title="Drag to move">::</span>
            <span class="card-id">${item.id}</span>${labels}
            ${item.assignee_id ? `<span class="assignee">${item.assignee_id}</span>` : ''}
          </div>`;
        const delBtn = card.querySelector('.card-delete');
        if (delBtn) delBtn.onclick = e => { e.stopPropagation(); deleteItemDirect(item.id); };
        body.appendChild(card);
      });
    }
    // Drop zones
    const dz = col.querySelector('.col-body');
    dz.ondragenter = e => { e.preventDefault(); dz.classList.add('drag-over'); };
    dz.ondragover = e => { e.preventDefault(); if (e.dataTransfer) e.dataTransfer.dropEffect = 'move'; dz.classList.add('drag-over'); };
    dz.ondragleave = e => { if (e.target === dz) dz.classList.remove('drag-over'); };
    dz.ondrop = async e => {
      e.preventDefault(); dz.classList.remove('drag-over');
      const id = e.dataTransfer?.getData('text/plain') || draggedItemId;
      if (!id || items.find(i => i.id === id)?.status === status) return;
      await api(`/tasks/${currentTask}/items/${id}`, {method:'PATCH', body: JSON.stringify({status})});
      toast(`Moved to ${STATUS_LABELS[status]}`); loadItems();
    };
    board.appendChild(col);
  });
}

// --- Detail modal (post-style) ---
async function openDetailModal(id) {
  currentDetailId = id;
  const [data, cData] = await Promise.all([
    api(`/tasks/${currentTask}/items/${id}`),
    api(`/tasks/${currentTask}/items/${id}/comments?per_page=100`)
  ]);
  const item = data.item || data;
  const comments = (cData.comments || cData) || [];
  const children = item.children || item.subtasks || [];
  const canDelete = item.created_by === token();
  const isOwner = item.assignee_id === token();

  const inner = $('modalInner');
  inner.innerHTML = `
    <!-- Header -->
    <div class="modal-head">
      <div class="modal-head-row">
        <div>
          <span class="item-slug">${esc(item.slug || item.id)}</span>
          <span style="font-size:11px;color:var(--muted);margin-left:6px">&middot; ${timeAgo(item.created_at)}</span>
        </div>
        <div class="modal-head-actions">
          <button class="icon-btn" onclick="toggleEditSection()" title="Edit">&#9998;</button>
          ${canDelete ? `<button class="icon-btn danger" onclick="deleteItemFromDetail('${escAttr(item.id)}')" title="Delete">&#128465;</button>` : ''}
          <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
      </div>
      <div class="item-title-display">${esc(item.title)}</div>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <!-- Meta badges -->
      <div class="detail-section" style="padding-bottom:0">
        <div class="detail-meta">
          <span class="badge badge-status ${item.status}"><span class="dot"></span>${STATUS_LABELS[item.status] || item.status}</span>
          <span class="badge badge-priority ${item.priority}">${PRIORITY_LABELS[item.priority] || item.priority}</span>
          ${(item.labels||[]).map(l => `<span class="label">${esc(l)}</span>`).join('')}
        </div>

        <!-- Agent info -->
        <div class="detail-agent">
          <span class="agent-dot" style="background:${agentColor(item.created_by)}"></span>
          <span class="agent-name">${esc(item.created_by || '')}</span>
          <span>created</span>
          ${item.assignee_id ? `
            <span style="margin-left:8px">&middot;</span>
            <span class="agent-dot" style="background:${agentColor(item.assignee_id)}"></span>
            <span class="agent-name" style="color:var(--purple)">${esc(item.assignee_id)}</span>
            <span>assigned</span>
          ` : '<span style="margin-left:8px">&middot; unassigned</span>'}
        </div>

        <!-- Description -->
        ${item.description
          ? `<div class="detail-desc"><div class="md-content">${renderMd(item.description)}</div></div>`
          : `<div class="detail-desc"><div class="detail-desc-empty">No description</div></div>`
        }
      </div>

      <!-- Subtasks -->
      ${children.length ? `
        <div class="detail-section" style="padding-top:8px">
          <div class="subtask-list">
            <h4>Subtasks (${children.length})</h4>
            ${children.map(s => `
              <div class="subtask-row" onclick="openDetailModal('${escAttr(s.id || s.slug)}')">
                <span class="badge badge-status ${s.status}"><span class="dot"></span></span>
                <span class="subtask-id">${esc(s.slug || s.id)}</span>
                <span>${esc(s.title)}</span>
              </div>
            `).join('')}
          </div>
        </div>
      ` : ''}

      <!-- Edit section (collapsed by default) -->
      <div class="edit-section" id="editSection" style="display:none">
        <h3>Edit</h3>
        <form onsubmit="return saveItemFromDetail(event, '${escAttr(item.id)}')">
          <div class="form-group"><label>Title</label><input id="eTitle" value="${esc(item.title)}"></div>
          <div class="form-group"><label>Description <small style="color:var(--muted)">(Markdown)</small></label><textarea id="eDesc">${esc(item.description || '')}</textarea></div>
          <div class="form-row">
            <div class="form-group"><label>Status</label>
              <select id="eStatus">${STATUSES.map(s => `<option ${s===item.status?'selected':''}>${s}</option>`).join('')}</select>
            </div>
            <div class="form-group"><label>Priority</label>
              <select id="ePriority">${['none','urgent','high','medium','low'].map(p => `<option ${p===item.priority?'selected':''}>${p}</option>`).join('')}</select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Labels</label><input id="eLabels" value="${esc((item.labels||[]).join(', '))}"></div>
            <div class="form-group"><label>Assignee</label><input id="eAssignee" value="${esc(item.assignee_id || '')}" placeholder="agent-id"></div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn" onclick="toggleEditSection()">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>

      <!-- Comments -->
      <div class="comments-section">
        <div class="comments-header">Comments (${comments.length})</div>
        ${comments.length ? comments.map(c => `
          <div class="comment">
            <div class="comment-header">
              <span class="agent-dot" style="background:${agentColor(c.agent_id)}"></span>
              <span class="agent-name">${esc(c.agent_id)}</span>
              <span class="comment-time">${timeAgo(c.created_at)}</span>
              ${c.agent_id === token() ? `<button class="delete-comment" onclick="deleteComment('${escAttr(item.id)}',${c.id})">delete</button>` : ''}
            </div>
            <div class="comment-body md-content">${renderMd(c.content)}</div>
          </div>
        `).join('') : '<div class="no-comments">No comments yet</div>'}
        <div class="comment-form">
          <textarea id="commentInput" placeholder="Write a comment..." rows="1" onkeydown="if(event.key==='Enter'&&(event.metaKey||event.ctrlKey)){event.preventDefault();addComment('${escAttr(item.id)}')}"></textarea>
          <button class="send-btn" onclick="addComment('${escAttr(item.id)}')">Send</button>
        </div>
      </div>
    </div>`;

  $('modal').classList.add('open');
}

function toggleEditSection() {
  const es = $('editSection');
  es.style.display = es.style.display === 'none' ? '' : 'none';
  if (es.style.display !== 'none') $('eTitle').focus();
}

async function saveItemFromDetail(e, id) {
  e.preventDefault();
  const labels = $('eLabels').value.split(',').map(l=>l.trim()).filter(Boolean);
  const body = {
    title: $('eTitle').value,
    description: $('eDesc').value || null,
    status: $('eStatus').value,
    priority: $('ePriority').value,
    labels,
    assignee_id: $('eAssignee').value || null,
  };
  await api(`/tasks/${currentTask}/items/${id}`, {method:'PATCH', body: JSON.stringify(body)});
  toast('Updated');
  loadItems();
  openDetailModal(id);
}

async function deleteItemFromDetail(id) {
  if (!confirm(`Delete ${id}?`)) return;
  await api(`/tasks/${currentTask}/items/${id}`, {method:'DELETE'});
  toast('Deleted'); closeModal(); loadItems();
}

async function deleteItemDirect(id) {
  if (!confirm(`Delete ${id}?`)) return;
  await api(`/tasks/${currentTask}/items/${id}`, {method:'DELETE'});
  toast('Deleted'); loadItems();
}

function closeModal() { $('modal').classList.remove('open'); currentDetailId = null; }

// --- Create modal ---
function openCreateModal() {
  if (!currentTask) { toast('Select a task first'); return; }
  $('cTitle').value = ''; $('cDesc').value = ''; $('cStatus').value = 'backlog';
  $('cPriority').value = 'none'; $('cLabels').value = ''; $('cAssignee').value = '';
  $('createModal').classList.add('open');
  $('cTitle').focus();
}
function closeCreateModal() { $('createModal').classList.remove('open'); }

async function createItem(e) {
  e.preventDefault();
  const labels = $('cLabels').value.split(',').map(l=>l.trim()).filter(Boolean);
  const body = {
    title: $('cTitle').value,
    description: $('cDesc').value || null,
    status: $('cStatus').value,
    priority: $('cPriority').value,
    labels,
    assignee_id: $('cAssignee').value || null,
  };
  await api(`/tasks/${currentTask}/items`, {method:'POST', body: JSON.stringify(body)});
  toast('Created');
  closeCreateModal(); loadItems();
}

// --- Comments ---
async function addComment(itemId) {
  const input = $('commentInput');
  if (!input.value.trim()) return;
  await api(`/tasks/${currentTask}/items/${itemId}/comments`, {method:'POST', body: JSON.stringify({content: input.value})});
  openDetailModal(itemId);
}

async function deleteComment(itemId, commentId) {
  await api(`/tasks/${currentTask}/items/${itemId}/comments/${commentId}`, {method:'DELETE'});
  openDetailModal(itemId);
}

// --- Init ---
$('apiBaseInput').value = normalizeApiBase(localStorage.getItem(API_BASE_STORAGE_KEY)) || defaultApiBase();
$('taskSelect').onchange = e => { currentTask = e.target.value; loadItems(); };
$('tokenInput').value = localStorage.getItem('hive-kanban-token') || '';
$('tokenInput').onchange = () => { localStorage.setItem('hive-kanban-token', token()); loadItems(); };
$('apiBaseInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); applyApiTarget(); } });
document.onkeydown = e => {
  if (e.key === 'Escape') {
    if ($('createModal').classList.contains('open')) closeCreateModal();
    else closeModal();
  }
};
loadTasks();
</script>
</body></html>
